<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>金色兰博基尼驶入动画 - 透明背景版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --gold-primary: #ffd700;
      --neon-cyan: #00ffff;
      --neon-magenta: #ff00ff;
      --brake-red: #ff0000;
      --scene-width: 500px;
      --scene-height: 500px;
    }
    
    body {
      background: 
        radial-gradient(circle at 20% 20%, #1a0b2e 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, #0d1b2a 0%, transparent 40%),
        linear-gradient(135deg, #0f0c29, #302b63, #24243e, #0f0c29);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Segoe UI', 'Montserrat', sans-serif;
    }
    
    .cinematic-frame {
      width: var(--scene-width);
      height: var(--scene-height);
      position: relative;
      perspective: 1500px;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 
        0 0 60px rgba(255, 215, 0, 0.5),
        0 0 120px rgba(255, 0, 128, 0.3),
        0 0 200px rgba(0, 0, 0, 0.2);
      transform: translateZ(0);
    }
    
    /* 黄昏天空背景 */
    .sky {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom,
        rgba(255, 94, 0, 0.15) 0%,
        rgba(255, 0, 128, 0.25) 30%,
        rgba(0, 0, 40, 0.95) 100%);
      z-index: 1;
    }
    
    /* 星空效果 */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.8) 50%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 60%, rgba(255, 255, 255, 0.7) 50%, transparent 100%),
        radial-gradient(2px 2px at 60% 20%, rgba(255, 255, 255, 0.6) 50%, transparent 100%),
        radial-gradient(1px 1px at 80% 40%, rgba(255, 255, 255, 0.5) 50%, transparent 100%);
      background-size: 500px 500px;
      animation: starsTwinkle 3s infinite alternate;
      z-index: 1;
    }
    
    @keyframes starsTwinkle {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    /* 城市剪影 */
    .city-silhouette {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 150px;
      background: linear-gradient(to top, 
        rgba(0, 0, 0, 0.95) 0%,
        transparent 100%);
      z-index: 2;
    }
    
    /* 道路系统 */
    .road-system {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 140px;
      background: linear-gradient(to top, 
        #080808 0%, 
        #101010 20px,
        #181818 40px,
        #202020 100%);
      transform: translateX(-25%);
      z-index: 3;
    }
    
    /* 道路标线 */
    .road-lines {
      position: absolute;
      width: 100%;
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 30px,
        var(--gold-primary) 30px,
        var(--gold-primary) 60px
      );
      top: 50%;
      transform: translateY(-50%);
      animation: roadMove 0.5s linear infinite;
      filter: drop-shadow(0 0 5px var(--gold-primary));
    }
    
    @keyframes roadMove {
      0% { transform: translateY(-50%) translateX(0); }
      100% { transform: translateY(-50%) translateX(-60px); }
    }
    
    /* 车辆物理系统 - 使用您的透明背景图片 */
    .vehicle-system {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      z-index: 5;
      animation: vehicleApproach 4.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    
    /* 车辆容器 - 精确尺寸匹配透明图片 */
    .vehicle-container {
      position: absolute;
      width: 320px;  /* 调整为匹配您的图片比例 */
      height: 156px; /* 640x626 -> 320x156 保持比例 */
      bottom: 60px;
      left: 50%;
      transform-origin: bottom center;
      transform: translateX(-50%);
    }
    
    /* 透明背景车辆图片 */
    .transparent-car {
      width: 100%;
      height: 100%;
      background-image: url('https://i.ibb.co/F4qMwhzD/20260327192623-43-1.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      filter: 
        drop-shadow(0 0 15px rgba(255, 215, 0, 0.6))
        drop-shadow(0 0 30px rgba(255, 0, 128, 0.3))
        brightness(1.3)
        contrast(1.2);
    }
    
    /* 金属漆效果层 */
    .paint-effect {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, 
        rgba(255, 215, 0, 0.3) 0%,
        transparent 20%,
        rgba(255, 0, 128, 0.2) 50%,
        transparent 80%,
        rgba(0, 255, 255, 0.3) 100%);
      mix-blend-mode: overlay;
      animation: paintShimmer 4s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes paintShimmer {
      0%, 100% { 
        background-position: -100% 0;
        opacity: 0.7;
      }
      50% { 
        background-position: 200% 0;
        opacity: 0.9;
      }
    }
    
    /* 动态模糊 */
    .motion-blur {
      position: absolute;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.2) 25%,
        rgba(255, 255, 255, 0.4) 50%,
        rgba(255, 255, 255, 0.2) 75%,
        transparent 100%);
      animation: motionStreak 2.5s ease-out;
      filter: blur(5px);
      pointer-events: none;
    }
    
    @keyframes motionStreak {
      0% { 
        transform: translateX(-50%);
        opacity: 0.8;
      }
      70% { 
        opacity: 0.8;
      }
      100% { 
        transform: translateX(50%);
        opacity: 0;
      }
    }
    
    /* 刹车灯光效 */
    .brake-light-effect {
      position: absolute;
      bottom: -5px;
      left: 25%;
      right: 25%;
      height: 12px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--brake-red) 20%,
        #ff4444 50%,
        var(--brake-red) 80%,
        transparent 100%);
      border-radius: 6px;
      opacity: 0;
      filter: 
        blur(4px)
        drop-shadow(0 0 10px var(--brake-red))
        drop-shadow(0 0 20px var(--brake-red));
      animation: 
        brakeActivate 0.5s cubic-bezier(0.9, 0, 0.1, 1) 3.1s forwards,
        brakeGlow 1s 3.3s infinite alternate;
      z-index: 6;
    }
    
    @keyframes brakeActivate {
      0% { 
        opacity: 0;
        transform: scale(0.5) translateY(20px);
      }
      60% { 
        opacity: 1;
        transform: scale(1.2) translateY(0);
      }
      100% { 
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    @keyframes brakeGlow {
      0% { opacity: 0.6; filter: blur(4px) drop-shadow(0 0 10px var(--brake-red)); }
      100% { opacity: 1; filter: blur(6px) drop-shadow(0 0 20px var(--brake-red)); }
    }
    
    /* 排气烟雾 */
    .exhaust-smoke {
      position: absolute;
      width: 40px;
      height: 20px;
      border-radius: 50%;
      bottom: 30px;
      background: radial-gradient(circle, 
        rgba(255, 100, 0, 0.9) 0%,
        rgba(255, 50, 0, 0.6) 20%,
        rgba(100, 30, 0, 0.3) 40%,
        transparent 60%);
      opacity: 0;
      filter: blur(3px);
      z-index: 4;
    }
    
    .exhaust-left { 
      left: 100px;
      animation: exhaustEmitLeft 0.8s 3.2s ease-out;
    }
    
    .exhaust-right { 
      right: 100px;
      animation: exhaustEmitRight 0.8s 3.3s ease-out;
    }
    
    @keyframes exhaustEmitLeft {
      0% {
        transform: translate(0, 0) scale(0.5);
        opacity: 0;
      }
      20% {
        transform: translate(-20px, -20px) scale(1.2);
        opacity: 0.8;
      }
      100% {
        transform: translate(-60px, -80px) scale(2.5);
        opacity: 0;
      }
    }
    
    @keyframes exhaustEmitRight {
      0% {
        transform: translate(0, 0) scale(0.5);
        opacity: 0;
      }
      20% {
        transform: translate(20px, -20px) scale(1.2);
        opacity: 0.8;
      }
      100% {
        transform: translate(60px, -80px) scale(2.5);
        opacity: 0;
      }
    }
    
    /* 车辆驶入动画 - 优化版 */
    @keyframes vehicleApproach {
      0% {
        transform: 
          translateZ(-1000px)
          scale(0.08)
          rotateX(20deg)
          rotateY(5deg);
        filter: 
          blur(30px)
          brightness(0.1)
          contrast(0.8);
        opacity: 0.2;
      }
      
      30% {
        transform: 
          translateZ(-400px)
          scale(0.3)
          rotateX(10deg)
          rotateY(2deg);
        filter: 
          blur(20px)
          brightness(0.4)
          contrast(0.9);
        opacity: 0.5;
      }
      
      60% {
        transform: 
          translateZ(-100px)
          scale(0.7)
          rotateX(3deg)
          rotateY(0.5deg);
        filter: 
          blur(8px)
          brightness(0.8)
          contrast(1.1);
        opacity: 0.8;
      }
      
      75% {
        transform: 
          translateZ(0)
          scale(1)
          rotateX(0)
          rotateY(0);
        filter: 
          blur(2px)
          brightness(1.3)
          contrast(1.3);
        opacity: 1;
      }
      
      80% {
        transform: 
          translateZ(0)
          scale(1.12)
          rotateX(-3deg)
          translateY(-5px);
      }
      
      85% {
        transform: 
          translateZ(0)
          scale(0.98)
          rotateX(2deg)
          translateY(3px);
      }
      
      90% {
        transform: 
          translateZ(0)
          scale(1.06)
          rotateX(-1deg)
          translateY(-2px);
      }
      
      95% {
        transform: 
          translateZ(0)
          scale(0.99)
          rotateX(0.5deg)
          translateY(1px);
      }
      
      100% {
        transform: 
          translateZ(0)
          scale(1)
          rotateX(0)
          translateY(0);
        filter: 
          blur(0)
          brightness(1.2)
          contrast(1.2);
      }
    }
    
    /* 冲击波 */
    .shockwave {
      position: absolute;
      top: 50%;
      left: 50%;
      border: 2px solid rgba(0, 255, 255, 0.6);
      border-radius: 50%;
      opacity: 0;
      filter: blur(1px);
    }
    
    .shockwave-1 {
      width: 50px;
      height: 50px;
      animation: shockwaveExpand 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 3.3s;
    }
    
    .shockwave-2 {
      width: 50px;
      height: 50px;
      animation: shockwaveExpand 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 3.4s;
    }
    
    .shockwave-3 {
      width: 50px;
      height: 50px;
      animation: shockwaveExpand 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 3.5s;
    }
    
    @keyframes shockwaveExpand {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
        border-width: 3px;
      }
      100% {
        transform: translate(-50%, -50%) scale(8);
        opacity: 0;
        border-width: 0;
      }
    }
    
    /* 地面震动 */
    .ground-shake {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: cameraShake 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 3.2s;
      z-index: 1;
    }
    
    @keyframes cameraShake {
      0% { transform: translate(0, 0) rotate(0); }
      10% { transform: translate(-3px, -2px) rotate(-0.5deg); }
      20% { transform: translate(2px, 3px) rotate(0.3deg); }
      30% { transform: translate(-2px, 1px) rotate(-0.2deg); }
      40% { transform: translate(1px, -1px) rotate(0.1deg); }
      50% { transform: translate(-1px, 2px) rotate(-0.1deg); }
      60% { transform: translate(3px, -3px) rotate(0.2deg); }
      70% { transform: translate(-2px, 1px) rotate(-0.1deg); }
      80% { transform: translate(1px, -1px) rotate(0.1deg); }
      90% { transform: translate(-1px, 1px) rotate(0); }
      100% { transform: translate(0, 0) rotate(0); }
    }
    
    /* UI系统 */
    .ui-system {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    
    .brand-display {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 3px;
      color: transparent;
      background: linear-gradient(45deg, 
        var(--gold-primary) 0%,
        #ffffff 25%,
        var(--gold-primary) 50%,
        #ffffff 75%,
        var(--gold-primary) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 0;
      animation: 
        brandReveal 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 3.8s forwards,
        brandShine 3s 4.5s infinite;
    }
    
    @keyframes brandReveal {
      0% { 
        opacity: 0;
        transform: translateY(30px) scale(0.8);
        letter-spacing: 10px;
      }
      100% { 
        opacity: 1;
        transform: translateY(0) scale(1);
        letter-spacing: 3px;
      }
    }
    
    @keyframes brandShine {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }
    
    .control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      pointer-events: auto;
    }
    
    .control-btn {
      background: rgba(0, 0, 0, 0.7);
      color: var(--gold-primary);
      border: 2px solid var(--gold-primary);
      padding: 10px 20px;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
    }
    
    .control-btn:hover {
      background: rgba(255, 215, 0, 0.2);
      box-shadow: 
        0 0 20px rgba(255, 215, 0, 0.5),
        0 0 40px rgba(255, 0, 128, 0.2);
      transform: scale(1.05) translateY(-2px);
    }
    
    .info-hud {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 9px;
      font-family: 'Consolas', monospace;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="cinematic-frame">
    <!-- 背景层 -->
    <div class="sky"></div>
    <div class="stars"></div>
    <div class="city-silhouette"></div>
    
    <!-- 道路层 -->
    <div class="road-system">
      <div class="road-lines"></div>
    </div>
    
    <!-- 物理效果层 -->
    <div class="ground-shake"></div>
    
    <!-- 车辆系统 -->
    <div class="vehicle-system">
      <div class="vehicle-container">
        <!-- 透明背景车辆图片 -->
        <div class="transparent-car">
          <div class="motion-blur"></div>
          <div class="paint-effect"></div>
        </div>
        <!-- 刹车灯 -->
        <div class="brake-light-effect"></div>
      </div>
    </div>
    
    <!-- 特效层 -->
    <div class="exhaust-smoke exhaust-left"></div>
    <div class="exhaust-smoke exhaust-right"></div>
    
    <div class="shockwave shockwave-1"></div>
    <div class="shockwave shockwave-2"></div>
    <div class="shockwave shockwave-3"></div>
    
    <!-- UI层 -->
    <div class="ui-system">
      <div class="brand-display">LAMBORGHINI</div>
      <div class="control-panel">
        <button class="control-btn" onclick="replayAnimation()">REPLAY</button>
      </div>
      <div class="info-hud">透明背景版 | 500×500</div>
    </div>
  </div>

  <script>
    function replayAnimation() {
      const elements = [
        '.vehicle-system',
        '.brake-light-effect',
        '.exhaust-left',
        '.exhaust-right',
        '.shockwave-1',
        '.shockwave-2',
        '.shockwave-3',
        '.ground-shake',
        '.brand-display',
        '.motion-blur'
      ];
      
      // 重置所有动画
      elements.forEach(selector => {
        const el = document.querySelector(selector);
        if (el) {
          el.style.animation = 'none';
          void el.offsetWidth; // 触发重排
        }
      });
      
      // 重新应用动画
      setTimeout(() => {
        const elementsToAnimate = {
          '.vehicle-system': 'vehicleApproach 4.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
          '.brake-light-effect': 'brakeActivate 0.5s cubic-bezier(0.9, 0, 0.1, 1) 3.1s forwards, brakeGlow 1s 3.3s infinite alternate',
          '.exhaust-left': 'exhaustEmitLeft 0.8s 3.2s ease-out',
          '.exhaust-right': 'exhaustEmitRight 0.8s 3.3s ease-out',
          '.shockwave-1': 'shockwaveExpand 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 3.3s',
          '.shockwave-2': 'shockwaveExpand 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 3.4s',
          '.shockwave-3': 'shockwaveExpand 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 3.5s',
          '.ground-shake': 'cameraShake 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 3.2s',
          '.brand-display': 'brandReveal 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 3.8s forwards, brandShine 3s 4.5s infinite',
          '.motion-blur': 'motionStreak 2.5s ease-out'
        };
        
        Object.entries(elementsToAnimate).forEach(([selector, animation]) => {
          const el = document.querySelector(selector);
          if (el) el.style.animation = animation;
        });
      }, 10);
    }
    
    // 点击容器也可重播
    document.querySelector('.cinematic-frame').addEventListener('click', function(e) {
      if (!e.target.classList.contains('control-btn')) {
        replayAnimation();
      }
    });
    
    // 可选：5秒后自动重播
    // setTimeout(replayAnimation, 6000);
  </script>
</body>
</html>
