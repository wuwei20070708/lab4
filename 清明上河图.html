<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>清明上河图缓缓展开 · 增强版</title>
  <style>
    body {
      background: #f5f0e8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: "SimHei", "KaiTi", serif;
    }

    .scroll-container {
      position: relative;
      width: 200px;
      height: 200px;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 0 12px rgba(0,0,0,0.2);
      background: #e8dcc8; /* 古纸底色 */
      animation: scrollUnroll 8s ease-out forwards;
    }

    /* 卷轴轴心（左侧） */
    .scroll-container::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 60px;
      background: linear-gradient(to right, #8b4513, #a0522d);
      border-radius: 6px 0 0 6px;
      z-index: 2;
      box-shadow: 2px 0 4px rgba(0,0,0,0.3);
    }

    /* 背景图：清明上河图（在线高清版） */
    .scroll-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 100%;
      background: url('https://ts1.tc.mm.bing.net/th/id/R-C.0ca95822900c612f1e7d335410b48512?rik=%2bxaZKMwVlHS%2fxg&riu=http%3a%2f%2fexp-picture.cdn.bcebos.com%2f05e24be983aee8d7e09316586b781431deb66611.jpg%3fx-bce-process%3dimage%252Fcrop%252Cx_0%252Cy_0%252Cw_938%252Ch_428%252Fformat%252Cf_auto%252Fquality%252Cq_80&ehk=YTrbkZMvuZVcQup1IDJhx%2f2X9fpr3xjhBKxrLrrJbxM%3d&risl=&pid=ImgRaw&r=0') no-repeat center;
      background-size: cover;
      background-position: 100% 0;
      filter: sepia(0.3) contrast(1.1) brightness(0.95) saturate(1.2);
      clip-path: inset(0 0 0 90%);
      animation: scrollUnroll 8s ease-out forwards;
      z-index: 1;
    }

    /* 展开动画 */
    @keyframes scrollUnroll {
      0% {
        clip-path: inset(0 0 0 90%);
        background-position: 100% 0;
      }
      30% {
        clip-path: inset(0 0 0 0);
        background-position: 50% 0;
      }
      100% {
        clip-path: inset(0 0 0 0);
        background-position: 0 0;
      }
    }

    /* 古风标题 */
    .title {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      color: #5c4033;
      font-size: 10px;
      text-shadow: 0 0 1px #fff;
      z-index: 3;
      opacity: 0;
      animation: fadeIn 1s ease-in 7s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="scroll-container">
    <div class="title">清明上河图 · 缓缓展开</div>
  </div>
</body>
</html>
